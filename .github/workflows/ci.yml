name: CI

permissions:
  contents: write

on:
  push:
  workflow_dispatch: {}

jobs:
  build:
    name: Build library and r2 plugin
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install build deps
        run: sudo apt-get update -y && sudo apt-get install -y build-essential autoconf automake libtool pkg-config
      - name: Build library
        run: make
      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v1
      - name: Build r2 plugin
        run: make r2
      - name: Run testsuite
        run: make -C test
      - name: Check for tag on commit
        id: check_tag
        run: |
          set -eux
          TAG="$(git tag --points-at $GITHUB_SHA | head -n1 || true)"
          echo "found tag: '$TAG'"
          if [ -z "$TAG" ]; then
            echo "tag=" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$TAG" | grep -qE '^[0-9]'; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

  debian:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build deps
        run: sudo apt-get update -y && sudo apt-get install -y build-essential autoconf automake libtool pkg-config

      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v1

      - name: Build Debian package
        run: make -C dist/debian SUDO=

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: dist/debian/*.deb
          if-no-files-found: error

  release:
    name: Create release and upload artifacts
    runs-on: ubuntu-latest
    needs: [build, debian]
    if: needs.build.outputs.tag != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create source tarball
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          echo "Creating archive for $TAG"
          git archive --format=tar.gz --prefix=libhbc-$TAG/ $TAG -o libhbc-$TAG.tgz
          ls -l libhbc*

      - name: Download Debian package artifact
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          files: |
            ./libhbc-${{ needs.build.outputs.tag }}.tgz
            ./release-artifacts/*.deb
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
