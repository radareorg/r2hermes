name: CI

permissions:
  contents: write

on:
  push:
  workflow_dispatch: {}

jobs:
  build:
    name: Build library and r2 plugin
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install build deps
        run: sudo apt-get update -y && sudo apt-get install -y build-essential autoconf automake libtool pkg-config
      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v2
      - name: Build library
        run: make
      - name: Build r2 plugin
        run: make r2
      - name: Run testsuite
        run: make -C test
      - name: Check for tag on commit
        id: check_tag
        run: |
          set -eux
          TAG="$(git tag --points-at $GITHUB_SHA | head -n1 || true)"
          echo "found tag: '$TAG'"
          if [ -z "$TAG" ]; then
            echo "tag=" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$TAG" | grep -qE '^[0-9]'; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

  debian:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install build deps
        run: sudo apt-get update -y && sudo apt-get install -y build-essential autoconf automake libtool pkg-config

      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v2

      - name: Build Debian package
        run: make -C dist/debian SUDO=

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: dist/debian/*.deb
          if-no-files-found: error

  windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.x

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install meson ninja

      - name: Install radare2
        id: r2
        uses: radareorg/github-actions@v2

      - name: Build and install with Meson
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALLDIR=%%i"
          if not defined VSINSTALLDIR (
            echo Visual Studio with MSVC tools was not found.
            exit /b 1
          )
          call "%VSINSTALLDIR%\Common7\Tools\VsDevCmd.bat" -arch=x64
          meson setup builddir --prefix="%CD%\install" -Dr2_plugdir="%CD%\install\lib\radare2\plugins" -Dr2_prefix="%CD%\install"
          meson compile -C builddir
          meson install -C builddir

      - name: Verify staged install
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path install -Recurse -File -ErrorAction SilentlyContinue
          if (-not $files) {
            throw "No files were installed under $PWD\install"
          }
          $files | ForEach-Object { $_.FullName }

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path install\* -DestinationPath r2hermes-windows-x64.zip -Force

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-package
          path: r2hermes-windows-x64.zip
          if-no-files-found: error

  release:
    name: Create release and upload artifacts
    runs-on: ubuntu-latest
    needs: [build, debian, windows]
    if: needs.build.outputs.tag != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create source tarball
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          echo "Creating archive for $TAG"
          git archive --format=tar.gz --prefix=libhbc-$TAG/ $TAG -o libhbc-$TAG.tgz
          ls -l libhbc*

      - name: Download Debian package artifact
        uses: actions/download-artifact@v8
        with:
          name: debian-package
          path: release-artifacts

      - name: Download Windows package artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-package
          path: release-artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          files: |
            ./libhbc-${{ needs.build.outputs.tag }}.tgz
            ./release-artifacts/*.deb
            ./release-artifacts/windows/*.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
